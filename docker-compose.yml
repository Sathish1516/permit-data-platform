version: '3.8'

services:

  db:
    image: postgres:15
    container_name: permits_db
    environment:
      POSTGRES_DB: permits_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: permits_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: permits_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
    command: sleep infinity

volumes:
  pgdata: